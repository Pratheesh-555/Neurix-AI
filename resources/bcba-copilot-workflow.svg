<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#E6F0FF"/>
    </linearGradient>
    <linearGradient id="titleLine" x1="160" y1="0" x2="1440" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowSlate" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 1.6px; fill: #2563EB; }
      .boxTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .boxBody { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #1E293B; }
      .arrowLabel { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #2563EB; }
      .chip { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1D4ED8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="54" y="48" width="1492" height="804" rx="34" fill="#FFFFFF" fill-opacity="0.75" stroke="#D7E3F4"/>

  <text x="120" y="128" class="section">GENAI AGENT WORKFLOW</text>
  <text x="120" y="180" class="title">BCBA Copilot Agent for Personalized ABA Plan Creation</text>
  <text x="120" y="220" class="subtitle">Child intake feeds retrieval, prediction, prompt assembly, plan drafting, explanation, and BCBA approval before the final therapy plan is used.</text>
  <rect x="120" y="248" width="1360" height="5" rx="2.5" fill="url(#titleLine)"/>

  <rect x="120" y="300" width="220" height="136" rx="24" fill="#E0F2FE" stroke="#7DD3FC" filter="url(#shadow)"/>
  <text x="148" y="340" class="chip">1. INPUT</text>
  <text x="148" y="376" class="boxTitle">Child Intake</text>
  <text x="148" y="407" class="boxBody">Profile, diagnosis, interests,</text>
  <text x="148" y="430" class="boxBody">sensory needs, challenges, goals</text>

  <rect x="400" y="300" width="220" height="136" rx="24" fill="#ECFDF5" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="428" y="340" class="chip">2. CHECK</text>
  <text x="428" y="376" class="boxTitle">Validation</text>
  <text x="428" y="407" class="boxBody">Normalize the profile and</text>
  <text x="428" y="430" class="boxBody">flag missing information</text>

  <rect x="680" y="300" width="220" height="136" rx="24" fill="#EFF6FF" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="708" y="340" class="chip">3. MEMORY</text>
  <text x="708" y="376" class="boxTitle">Similar-Case Retrieval</text>
  <text x="708" y="407" class="boxBody">Find related cases, overlap,</text>
  <text x="708" y="430" class="boxBody">and effective past approaches</text>

  <rect x="960" y="300" width="220" height="136" rx="24" fill="#F5F3FF" stroke="#C4B5FD" filter="url(#shadow)"/>
  <text x="988" y="340" class="chip">4. ML</text>
  <text x="988" y="376" class="boxTitle">Intervention Prediction</text>
  <text x="988" y="407" class="boxBody">Estimate success probability,</text>
  <text x="988" y="430" class="boxBody">confidence, and key drivers</text>

  <rect x="1240" y="300" width="220" height="136" rx="24" fill="#FFF7ED" stroke="#FDBA74" filter="url(#shadow)"/>
  <text x="1268" y="340" class="chip">5. LLM CONTEXT</text>
  <text x="1268" y="376" class="boxTitle">Prompt Assembly</text>
  <text x="1268" y="407" class="boxBody">Merge profile, evidence, ML,</text>
  <text x="1268" y="430" class="boxBody">and optional BCBA style memory</text>

  <rect x="1090" y="574" width="250" height="150" rx="26" fill="#DBEAFE" stroke="#60A5FA" filter="url(#shadow)"/>
  <text x="1118" y="616" class="chip">6. GENERATION</text>
  <text x="1118" y="652" class="boxTitle">Plan Drafting</text>
  <text x="1118" y="684" class="boxBody">Structured ABA draft with goals,</text>
  <text x="1118" y="707" class="boxBody">activities, schedule, script, tracking</text>

  <rect x="770" y="574" width="250" height="150" rx="26" fill="#E0F2FE" stroke="#7DD3FC" filter="url(#shadow)"/>
  <text x="798" y="616" class="chip">7. TRUST</text>
  <text x="798" y="652" class="boxTitle">Explanation Layer</text>
  <text x="798" y="684" class="boxBody">Why this plan, what evidence</text>
  <text x="798" y="707" class="boxBody">supported it, and review context</text>

  <rect x="450" y="574" width="250" height="150" rx="26" fill="#F0FDF4" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="478" y="616" class="chip">8. HUMAN IN LOOP</text>
  <text x="478" y="652" class="boxTitle">BCBA Review</text>
  <text x="478" y="684" class="boxBody">Approve, edit, or request</text>
  <text x="478" y="707" class="boxBody">regeneration before clinical use</text>

  <rect x="130" y="574" width="250" height="150" rx="26" fill="#0F172A" stroke="#1E293B" filter="url(#shadow)"/>
  <text x="158" y="616" style="font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #93C5FD;">9. OUTPUT</text>
  <text x="158" y="652" style="font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF;">Final Therapy Plan</text>
  <text x="158" y="684" style="font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1;">BCBA-approved personalized</text>
  <text x="158" y="707" style="font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #CBD5E1;">ABA program ready for use</text>

  <line x1="340" y1="368" x2="400" y2="368" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="620" y1="368" x2="680" y2="368" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="900" y1="368" x2="960" y2="368" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="1180" y1="368" x2="1240" y2="368" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <path d="M1350 444V500C1350 522 1332 540 1310 540H1240" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowBlue)"/>
  <path d="M1090 649H1020" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M770 649H700" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M450 649H380" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <text x="350" y="352" class="arrowLabel">structured profile</text>
  <text x="628" y="352" class="arrowLabel">validated profile</text>
  <text x="912" y="352" class="arrowLabel">retrieved evidence</text>
  <text x="1192" y="352" class="arrowLabel">ML insights</text>
  <text x="1292" y="528" class="arrowLabel">generation prompt</text>
  <text x="1028" y="631" class="arrowLabel">draft plan</text>
  <text x="708" y="631" class="arrowLabel">explanation</text>
  <text x="388" y="631" class="arrowLabel">approved draft</text>

</svg>
